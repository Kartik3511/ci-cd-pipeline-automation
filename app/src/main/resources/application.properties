spring.application.name=FoodGlance

# Use PORT env variable if set (required by cloud platforms like Railway, Render)
server.port=${PORT:8080}

# Google Cloud Vision API key — set GOOGLE_VISION_API_KEY in .env or cloud dashboard
google.vision.api-key=${GOOGLE_VISION_API_KEY}

# USDA FoodData Central API key — set USDA_API_KEY in .env or cloud dashboard
usda.api-key=${USDA_API_KEY}

# Allow large image uploads (up to 20 MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-swallow-size=-1

# Cache TTL: nutrition results expire after 1 hour, search results after 10 minutes
spring.cache.type=caffeine
spring.cache.cache-names=nutrition,food-search,icmr-nutrition
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=60m

# Logging configuration
logging.level.com.kartik.foodglance=INFO
