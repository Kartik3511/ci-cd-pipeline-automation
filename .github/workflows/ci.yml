name: FoodGlance CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: foodglance-app
  JAVA_VERSION: '17'
  MAVEN_CLI_OPTS: '--batch-mode --errors --fail-at-end --show-version'

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          cd app
          ./mvnw ${{ env.MAVEN_CLI_OPTS }} clean package -DskipTests

      - name: Run tests
        run: |
          cd app
          ./mvnw ${{ env.MAVEN_CLI_OPTS }} test

      - name: Generate test report
        if: always()
        run: |
          cd app
          ./mvnw ${{ env.MAVEN_CLI_OPTS }} surefire-report:report-only

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: foodglance-jar
          path: app/target/*.jar
          retention-days: 5

  # Job 2: Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run dependency security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './app'
          format: 'table'
          exit-code: '0'  # Don't fail build on vulnerabilities, just report
          severity: 'CRITICAL,HIGH'

  # Job 3: Build and Push Docker Image
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: foodglance-jar
          path: app/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value={{date 'YYYY.MM.DD-HHmm'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # Job 4: Deploy
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          GOOGLE_VISION_API_KEY: ${{ secrets.GOOGLE_VISION_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to start..."
          sleep 10

      - name: Health check
        run: |
          echo "Running health check..."
          max_attempts=10
          attempt=0
          until curl -f http://localhost:8080/health || [ $attempt -eq $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "Health check attempt $attempt/$max_attempts failed. Retrying in 5 seconds..."
            sleep 5
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Health check failed after $max_attempts attempts"
            docker logs ci-cd-app
            exit 1
          fi
          
          echo "✅ Health check passed!"

      - name: Verify API endpoints
        run: |
          echo "Testing /version endpoint..."
          curl -f http://localhost:8080/version || exit 1
          
          echo "Testing /health endpoint..."
          curl -f http://localhost:8080/health || exit 1
          
          echo "✅ All endpoints responding correctly!"

      - name: Deployment summary
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "Container: ci-cd-app"
          echo "Port: 8080"
          echo "Status: Running and healthy"

  # Job 5: Notification 
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-push, deploy]
    if: always()

    steps:
      - name: Pipeline status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully!"
          else
            echo "❌ CI/CD Pipeline failed. Check logs for details."
            exit 1
          fi
